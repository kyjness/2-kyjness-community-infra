name: puppytalk

services:
  # 1. Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
      # [중요] EC2 서버의 인증서 폴더를 컨테이너 안으로 연결 (읽기 전용 :ro)
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - puppytalk-network

  # 2. Database (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: db
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - puppytalk-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # 3. Cache
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes #데이터 영구저장 활성화
    volumes:
      - redis_data:/data
    networks:
      - puppytalk-network

  # 5. Backend (FastAPI + Alembic Auto Migration)
  backend:
    image: kyjness/puppytalk-be:latest
    build:
      context: ../2-kyjness-community-be
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    env_file:
      - .env
    command: >
      sh -c "alembic upgrade head && 
             exec gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - puppytalk-network
    # 호스트 포트 미노출: Nginx 리버스 프록시를 통해서만 접근

volumes:
  postgres_data:
  redis_data:


networks:
  puppytalk-network:
    driver: bridge