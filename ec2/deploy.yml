name: Deploy Backend to EC2

on:
  push:
    branches: [ main ] # main 브랜치에 코드가 push될 때 작동

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Docker Hub의 '계정명/레포이름' 형식을 맞춥니다.
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/puppytalk-be:latest

  deploy:
    needs: build-and-push # 빌드가 성공해야 배포 시작
    runs-on: ubuntu-latest
    steps:
      - name: SSH to EC2 and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. 인프라 설정 폴더로 이동
            cd ~/puppytalk/2-kyjness-community-infra
            
            # 2. 최신 이미지 다운로드 (Docker Hub에서 가져옴)
            docker compose pull backend
            
            # 3. 컨테이너 교체 (새 이미지 적용)
            docker compose up -d backend
            
            # 4. 안 쓰는 옛날 이미지 삭제 (용량 확보)
            docker image prune -f