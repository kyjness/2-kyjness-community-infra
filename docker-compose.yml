# PuppyTalk - 통합 (infra 폴더에서: docker compose up -d)
# nginx: http://localhost  |  프론트 직접: 8080  |  백엔드 직접: 8000  |  MySQL: 3306

name: puppytalk

services:
  nginx:
    image: nginx:alpine
    container_name: puppytalk-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - puppytalk-net

  mysql:
    image: mysql:8.0
    container_name: puppytalk-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-puppytalk}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../2-kyjness-community-be/docs/puppytalkdb.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 45s
    networks:
      - puppytalk-net

  backend:
    image: kyjness/puppytalk-backend:latest
    build:
      context: ../2-kyjness-community-be
      dockerfile: Dockerfile
    container_name: puppytalk-backend
    restart: unless-stopped
    env_file:
      - ../2-kyjness-community-be/.env.production
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-rootpassword}
      DB_NAME: ${DB_NAME:-puppytalk}
      BE_API_URL: ${BE_API_URL:-http://localhost}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://127.0.0.1}
    ports:
      - "8000:8000"
    volumes:
      - backend_upload:/app/upload
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - puppytalk-net

  frontend:
    image: kyjness/puppytalk-frontend:latest
    build:
      context: ../2-kyjness-community-fe
      dockerfile: Dockerfile
      args:
        API_BASE_URL: /v1
    container_name: puppytalk-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - puppytalk-net

volumes:
  mysql_data:
  backend_upload:

networks:
  puppytalk-net:
    driver: bridge
