# Nginx 리버스 프록시 (docker-compose.yml)
# /v1 → 백엔드(8000), 그 외 → 프론트엔드(80)
server {
    listen 80;
    server_name puppytalk.shop www.puppytalk.shop;

    # HTTP로 접속하면 HTTPS로 강제 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name puppytalk.shop www.puppytalk.shop;

    # 방금 발급받은 인증서 경로 (Docker 컨테이너 내부 경로 기준)
    ssl_certificate /etc/letsencrypt/live/puppytalk.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/puppytalk.shop/privkey.pem;

    # 보안 최적화 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # 업로드 용량 제한 (기본 1m → 20m, 백엔드 MAX_FILE_SIZE와 맞춤)
    client_max_body_size 20m;

    # MinIO 이미지 (S3_PUBLIC_BASE_URL=http://localhost/minio/puppytalk 일 때)
    location /minio/ {
        proxy_pass http://minio:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # API
    location /v1/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 프론트엔드(SPA)
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
