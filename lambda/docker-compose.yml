name: puppytalk

services:
  # 1. Database (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: db
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - puppytalk-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Cache (Redis)
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - puppytalk-network

volumes:
  postgres_data:
  redis_data:

networks:
  puppytalk-network:
    driver: bridge